name: Deploy to EC2

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm deployment'
        required: true
        default: ''

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build backend
        run: npm run build --workspace=backend

      - name: Build frontend
        run: cd frontend && npx vite build
        env:
          VITE_API_URL: /api

      - name: Run tests
        run: npm run test --workspace=backend
        continue-on-error: true
        env:
          JWT_SECRET: test-secret-key-that-is-at-least-32-characters-long-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-that-is-at-least-32-characters-long
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

  deploy:
    name: Deploy to EC2
    needs: build
    if: github.event.inputs.confirm == 'deploy'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          timeout: 300s
          script: |
            cd /home/ubuntu/Aniston-HRMS
            echo "=== Pulling latest code ==="
            git pull origin main
            echo "=== Installing dependencies ==="
            npm ci
            echo "=== Generating Prisma client ==="
            npx prisma generate
            echo "=== Pushing schema to DB ==="
            npx prisma db push
            echo "=== Building frontend ==="
            cd frontend && npx vite build && cd ..
            echo "=== Restarting PM2 ==="
            pm2 restart aniston-hrms
            echo "=== Waiting for startup ==="
            sleep 5
            echo "=== Health check ==="
            curl -s http://localhost:4000/api/health
            echo ""
            echo "=== Deploy complete! ==="
