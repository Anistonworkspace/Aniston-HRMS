name: Build & Deploy to EC2

# ─────────────────────────────────────────────────────────────────────────────
# Triggers on every push to main.
#
# Jobs (all run in parallel where possible):
#   build-android    — builds Android APK on ubuntu-latest
#   build-ios        — builds iOS IPA  on macos-latest
#   build-agent      — builds Windows .exe on windows-latest
#   build-and-deploy — builds web, runs tests, deploys to EC2,
#                      pushes APK to /downloads/, creates OTA bundle,
#                      bumps manifest.json → native-app users see update prompt
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   EC2_HOST / EC2_USER / EC2_SSH_KEY   — existing deploy secrets
#
#   ── Android signing (optional — debug APK built if missing) ──────────────
#   ANDROID_KEYSTORE_BASE64    base64 of your .jks keystore file
#   ANDROID_KEYSTORE_PASSWORD  keystore password
#   ANDROID_KEY_ALIAS          key alias (e.g. "aniston")
#   ANDROID_KEY_PASSWORD       key password
#
#   ── iOS signing (optional — job skips if missing) ──────────────────────
#   APPLE_CERTIFICATE          base64 of .p12 distribution certificate
#   APPLE_CERTIFICATE_PASSWORD .p12 export password
#   APPLE_PROVISIONING_PROFILE base64 of .mobileprovision Ad Hoc profile
#   APPLE_TEAM_ID              10-char Apple Developer Team ID
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  # Bug #1: Allow manual build trigger — useful for re-deploying the agent
  # exe without a code change (e.g. after updating EC2 secrets or API URL)
  workflow_dispatch:

jobs:

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 1 — Android APK
  # Builds a signed release APK when keystore secrets are present,
  # or an unsigned debug APK as fallback (still installable on Android).
  # Output: artifact "aniston-hrms-apk" → aniston-hrms.apk
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    continue-on-error: true   # failure never blocks EC2 deployment

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          # cache: gradle omitted — android/ folder is generated at runtime (npx cap add android)
          # Gradle cache requires gradle files in the repo; re-enable after committing android/ folder

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (Vite)
        run: cd frontend && VITE_API_URL=/api npx vite build

      - name: Install Capacitor Android platform locally
        working-directory: frontend
        run: npm install @capacitor/android @capacitor/cli

      - name: Initialise Android platform if not present
        working-directory: frontend
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
            echo "ℹ️  android/ initialised — commit this folder to speed up future builds"
          else
            echo "✅ android/ already exists"
          fi

      - name: Sync Capacitor (copy web assets → android/app/src/main/assets)
        working-directory: frontend
        run: npx cap sync android

      - name: Patch Android compileSdk 35 + AGP 8.7.3 + Gradle 8.9
        working-directory: frontend/android
        run: |
          # Capacitor stores SDK versions in variables.gradle (not app/build.gradle)
          sed -i 's/compileSdkVersion = 34/compileSdkVersion = 35/g' variables.gradle || true
          # play-services-tasks:18.4.1 (via capgo) requires minSdk >= 23; bump from 22
          sed -i 's/minSdkVersion = 22/minSdkVersion = 23/g' variables.gradle || true
          # Also patch app/build.gradle in case the project uses inline values
          sed -i 's/compileSdkVersion 34/compileSdkVersion 35/g' app/build.gradle || true
          sed -i 's/compileSdk = 34/compileSdk = 35/g' app/build.gradle || true
          sed -i 's/compileSdk 34/compileSdk 35/g' app/build.gradle || true
          # Bump AGP to 8.7.3 — AGP 8.3.x max compileSdk is 34, 8.7.x supports 35
          sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.7.3/g' build.gradle || true
          # Bump Gradle wrapper to 8.9 — required by AGP 8.7.x (minimum Gradle is 8.9)
          sed -i 's/gradle-[0-9.]*-all/gradle-8.9-all/g' gradle/wrapper/gradle-wrapper.properties || true
          sed -i 's/gradle-[0-9.]*-bin/gradle-8.9-bin/g' gradle/wrapper/gradle-wrapper.properties || true
          echo "✅ Patched — verifying:"
          grep -E "compileSdkVersion|minSdkVersion" variables.gradle 2>/dev/null || true
          grep -E "compileSdk" app/build.gradle 2>/dev/null || true
          grep "com.android.tools.build" build.gradle 2>/dev/null || true
          grep "distributionUrl" gradle/wrapper/gradle-wrapper.properties 2>/dev/null || true

      # ── Signed release (runs only when keystore secrets are set) ──────────
      - name: Decode keystore
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > frontend/android/app/aniston.jks
            echo "signed=true" >> $GITHUB_OUTPUT
            echo "✅ Keystore decoded — building signed release APK"
          else
            echo "signed=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No ANDROID_KEYSTORE_BASE64 secret — building debug APK"
          fi

      - name: Build SIGNED release APK
        if: steps.keystore.outputs.signed == 'true'
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/aniston.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"
          cp app/build/outputs/apk/release/app-release.apk aniston-hrms.apk
          echo "✅ Signed release APK built: $(du -sh aniston-hrms.apk)"

      - name: Build DEBUG APK (fallback — no keystore)
        if: steps.keystore.outputs.signed != 'true'
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk aniston-hrms.apk
          echo "✅ Debug APK built: $(du -sh aniston-hrms.apk)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aniston-hrms-apk
          path: frontend/android/aniston-hrms.apk
          retention-days: 90
          if-no-files-found: warn


  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 2 — iOS IPA  (macOS runner required by Apple toolchain)
  # Builds an Ad Hoc IPA for TestFlight / internal distribution.
  # Requires APPLE_* secrets — job silently fails if they are not configured.
  # Output: artifact "aniston-hrms-ipa" → AnistonHRMS.ipa
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    continue-on-error: true   # failure never blocks EC2 deployment

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (Vite)
        run: cd frontend && VITE_API_URL=/api npx vite build

      - name: Install Capacitor iOS platform locally
        working-directory: frontend
        run: npm install @capacitor/ios @capacitor/cli

      - name: Initialise iOS platform if not present
        working-directory: frontend
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
            echo "ℹ️  ios/ initialised — commit this folder to speed up future builds"
          else
            echo "✅ ios/ already exists"
          fi

      - name: Sync Capacitor (copy web assets → iOS)
        working-directory: frontend
        run: npx cap sync ios

      # ── Abort early if Apple secrets are not configured ───────────────────
      - name: Check Apple secrets are present
        id: apple_check
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "⚠️  APPLE_CERTIFICATE or APPLE_TEAM_ID secret not set — skipping iOS signing"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Apple distribution certificate
        if: steps.apple_check.outputs.skip != 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN=$RUNNER_TEMP/aniston.keychain-db
          security create-keychain -p "ci-temp" $KEYCHAIN
          security set-keychain-settings -lut 21600 $KEYCHAIN
          security unlock-keychain -p "ci-temp" $KEYCHAIN
          echo "$APPLE_CERTIFICATE" | base64 -d > $RUNNER_TEMP/dist.p12
          security import $RUNNER_TEMP/dist.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN
          security list-keychain -d user -s $KEYCHAIN

      - name: Install provisioning profile
        if: steps.apple_check.outputs.skip != 'true'
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APPLE_PROVISIONING_PROFILE" | base64 -d \
            > ~/Library/MobileDevice/Provisioning\ Profiles/aniston.mobileprovision

      - name: Build & archive Xcode project
        if: steps.apple_check.outputs.skip != 'true'
        working-directory: frontend/ios/App
        run: |
          xcodebuild archive \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/AnistonHRMS.xcarchive \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE=Manual \
            -allowProvisioningUpdates \
            -quiet

      - name: Export IPA (Ad Hoc)
        if: steps.apple_check.outputs.skip != 'true'
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>ad-hoc</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>stripSwiftSymbols</key><true/>
            <key>compileBitcode</key><false/>
          </dict></plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/AnistonHRMS.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      - name: Upload IPA artifact
        if: steps.apple_check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: aniston-hrms-ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 90
          if-no-files-found: warn


  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 3 — Windows Desktop Agent (.exe)  [unchanged]
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-agent:
    name: Build Desktop Agent (.exe)
    runs-on: windows-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install agent dependencies
        working-directory: agent-desktop
        run: npm ci

      - name: Build TypeScript
        working-directory: agent-desktop
        run: npm run build

      - name: Build Windows installer (.exe)
        working-directory: agent-desktop
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # API URL is now hardcoded to https://hr.anistonav.com/api in config.ts
          # Optional: TURN server for enterprise NAT traversal (set in GitHub secrets if needed)
          ANISTON_TURN_URL: ${{ secrets.ANISTON_TURN_URL || '' }}
          ANISTON_TURN_USERNAME: ${{ secrets.ANISTON_TURN_USERNAME || '' }}
          ANISTON_TURN_CREDENTIAL: ${{ secrets.ANISTON_TURN_CREDENTIAL || '' }}

      - name: Upload agent installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: aniston-agent-setup
          path: agent-desktop/build/aniston-agent-setup.exe
          retention-days: 30
          if-no-files-found: error


  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 4 — Build web, run tests, deploy to EC2
  #
  # What's new vs the old deploy:
  #   • Downloads Android APK artifact → SCPs it to EC2 /downloads/
  #   • Downloads iOS IPA artifact     → SCPs it to EC2 /uploads/ios-builds/
  #   • SSH step creates a versioned OTA bundle zip from frontend/dist/
  #     and updates app-updates/manifest.json
  #   → Existing native-app users see the "Update Now" screen on next launch
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [build-android, build-ios, build-agent]
    if: always()   # deploy even when native build jobs fail/skip

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx --no-install prisma generate

      - name: Build backend
        run: npm run build --workspace=backend

      - name: Build frontend
        run: cd frontend && npx vite build
        env:
          VITE_API_URL: /api

      - name: Run tests
        run: npm run test --workspace=backend
        env:
          JWT_SECRET: test-secret-key-that-is-at-least-32-characters-long-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-that-is-at-least-32-characters-long
          ENCRYPTION_KEY: test-encryption-key-at-least-32-chars-long!!
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      # ── Download build artifacts ─────────────────────────────────────────

      - name: Download agent installer artifact
        if: needs.build-agent.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: aniston-agent-setup
          path: ./agent-build

      - name: Download Android APK artifact
        if: needs.build-android.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: aniston-hrms-apk
          path: ./apk-build
        continue-on-error: true

      - name: Download iOS IPA artifact
        if: needs.build-ios.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: aniston-hrms-ipa
          path: ./ipa-build
        continue-on-error: true

      # ── SCP: push binaries to EC2 ────────────────────────────────────────

      # Create agent download directory BEFORE SCP so the target path exists
      - name: Prepare agent download directory on EC2
        if: needs.build-agent.result == 'success'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # Create both the parent and the agent-build/ subdirectory that scp-action writes into
          script: mkdir -p /home/ubuntu/Aniston-HRMS/downloads/agent/agent-build
        continue-on-error: true

      - name: Upload agent .exe to EC2
        if: needs.build-agent.result == 'success'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ./agent-build/aniston-agent-setup.exe
          target: /home/ubuntu/Aniston-HRMS/downloads/agent/
          strip_components: 1
        continue-on-error: true

      - name: Upload Android APK to EC2 /downloads/
        if: needs.build-android.result == 'success'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ./apk-build/aniston-hrms.apk
          target: /home/ubuntu/Aniston-HRMS/downloads/
          strip_components: 2
        continue-on-error: true

      - name: Upload iOS IPA to EC2 /uploads/ios-builds/
        if: needs.build-ios.result == 'success'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ./ipa-build/*.ipa
          target: /home/ubuntu/Aniston-HRMS/uploads/ios-builds/
          strip_components: 1
        continue-on-error: true

      # ── Main SSH deployment ───────────────────────────────────────────────

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          timeout: 300s
          script: |
            cd /home/ubuntu/Aniston-HRMS

            echo "=== [1/16] Pre-deployment backup ==="
            bash scripts/pre-deploy-backup.sh || echo "WARNING: Backup failed but continuing..."

            echo "=== [2/16] Installing system dependencies ==="
            # apt-get update can fail with exit 100 when mirror is mid-sync —
            # allow it to fail and proceed with cached package lists instead.
            sudo apt-get update -qq 2>&1 | grep -v "^E:" || true
            sudo apt-get install -y -qq --fix-missing chromium-browser || sudo apt-get install -y -qq --fix-missing chromium || true
            sudo apt-get install -y -qq --fix-missing \
              libatk1.0-0 libatk-bridge2.0-0 libcups2 libxdamage1 libxrandr2 \
              libgbm1 libpango-1.0-0 libcairo2 libnspr4 libnss3 libxss1 \
              libxtst6 xdg-utils fonts-liberation \
              libasound2t64 || sudo apt-get install -y -qq libasound2 || true
            sudo apt-get install -y -qq --fix-missing postgresql-client || true
            PG_DUMP_BIN=$(which pg_dump 2>/dev/null || true)
            if [ -n "$PG_DUMP_BIN" ]; then
              echo "pg_dump found at: $PG_DUMP_BIN ($(pg_dump --version))"
              grep -q 'PG_DUMP_PATH=' .env 2>/dev/null || echo "PG_DUMP_PATH=$PG_DUMP_BIN" >> .env
              grep -q 'PSQL_PATH=' .env 2>/dev/null || echo "PSQL_PATH=$(which psql 2>/dev/null || true)" >> .env
            fi
            which docker || (curl -fsSL https://get.docker.com | sudo sh && sudo usermod -aG docker ubuntu) || true
            which docker-compose || sudo apt-get install -y -qq docker-compose-plugin || true

            echo "=== [3/16] Pulling latest code ==="
            # Reset any local server changes (e.g. manual edits to docker-compose.yml
            # made during debugging) so git pull never aborts with "overwritten by merge"
            git fetch origin main
            git reset --hard origin/main

            echo "=== [3.5/17] Restarting Docker services (postgres + redis) for clean state ==="
            cd /home/ubuntu/Aniston-HRMS/docker
            sudo docker compose restart postgres redis 2>/dev/null \
              || sudo docker-compose restart postgres redis 2>/dev/null \
              || echo "⚠️  Docker restart failed (containers may not be running yet — will start in step 8)"
            # Wait up to 30s for postgres to be healthy after restart
            echo "Waiting for PostgreSQL to become ready..."
            for i in $(seq 1 10); do
              sleep 3
              if sudo docker compose exec -T postgres pg_isready -U postgres 2>/dev/null \
                 || sudo docker-compose exec -T postgres pg_isready -U postgres 2>/dev/null; then
                echo "✅ PostgreSQL ready after $((i*3))s"
                break
              fi
              echo "  [$((i*3))s] waiting for postgres..."
            done
            cd /home/ubuntu/Aniston-HRMS

            echo "=== [4/17] Setting production domain + encryption key ==="
            sed -i '/FRONTEND_URL/d' .env 2>/dev/null || true
            sed -i '/API_URL/d' .env 2>/dev/null || true
            sed -i -e '$a\' .env 2>/dev/null || true
            echo 'FRONTEND_URL=https://hr.anistonav.com' >> .env
            echo 'API_URL=https://hr.anistonav.com' >> .env
            grep -q 'ENCRYPTION_KEY=' .env || echo 'ENCRYPTION_KEY=30f3a3cf6ce04631c122256f5656c70c69429d380ae91c8de9d5f8e05c4a0cf2' >> .env
            # Ensure AI_SERVICE_URL has no surrounding quotes — quoted value causes Node.js fetch failed
            sed -i '/^AI_SERVICE_URL=/d' .env 2>/dev/null || true
            echo 'AI_SERVICE_URL=http://localhost:8000' >> .env

            echo "=== [5/17] Installing Node.js dependencies ==="
            export SCARF_ANALYTICS=false
            npm ci || (echo "Retrying npm ci..." && rm -rf node_modules && npm ci)
            node -e "import('tar').then(t => console.log('✅ tar package OK:', typeof t.create)).catch(e => console.error('❌ tar missing:', e.message))" || true

            echo "=== [5.5/17] Pre-migration: add new NOT NULL columns via prisma db execute ==="
            echo "" | base64 -d > /tmp/premigrate.sql
            npx --no-install prisma db execute --schema prisma/schema.prisma --file /tmp/premigrate.sql && echo "Pre-migration columns ensured" || echo "Pre-migration note: some columns may already exist (safe to ignore)"

            echo "=== [5.7/17] Pre-migration: fix orphaned BulkResumeItem.applicationId FK ==="
            echo "" | base64 -d > /tmp/fix_fk_orphans.sql
            npx --no-install prisma db execute --schema prisma/schema.prisma --file /tmp/fix_fk_orphans.sql && echo "✅ Orphaned applicationId references cleared" || echo "Note: BulkResumeItem table may not exist yet (safe to ignore)"

            echo "=== [6/17] Syncing database schema ==="
            npx --no-install prisma db push --accept-data-loss || {
              echo "WARNING: Schema push failed. Trying without flag..."
              npx --no-install prisma db push 2>/dev/null || echo "Schema push skipped (schema may already be up to date)"
            }

            echo "=== [7/17] Generating Prisma client (after schema sync) ==="
            npx --no-install prisma generate
            echo "✅ Prisma client regenerated"

            echo "=== [8/17] Building & starting AI service (Docker + OCR) ==="

            # Install tesseract + poppler on the host so the Node.js fallback also works
            sudo apt-get install -y -qq --fix-missing tesseract-ocr tesseract-ocr-eng poppler-utils || true

            # Install Docker if missing
            if ! command -v docker &>/dev/null; then
              echo "Docker not found — installing..."
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker ubuntu
              echo "Docker installed."
            fi

            # Use sudo docker because group membership requires a fresh login to take effect.
            # Verify docker daemon is running.
            sudo systemctl start docker || true
            sudo docker info > /dev/null 2>&1 || { echo "⚠️  Docker daemon not accessible — skipping AI service"; }

            cd /home/ubuntu/Aniston-HRMS/docker

            # Ensure docker/.env has empty AI_SERVICE_API_KEY so Python skips the API key check.
            # docker-compose.yml uses "${AI_SERVICE_API_KEY-dev-ai-key}" (no colon) so empty
            # string is passed through — Python's "if settings.api_key:" guard skips auth.
            touch /home/ubuntu/Aniston-HRMS/docker/.env
            sed -i '/^AI_SERVICE_API_KEY=/d' /home/ubuntu/Aniston-HRMS/docker/.env 2>/dev/null || true
            echo 'AI_SERVICE_API_KEY=' >> /home/ubuntu/Aniston-HRMS/docker/.env
            echo "✅ docker/.env: AI_SERVICE_API_KEY= (Python auth guard disabled)"

            echo "Building AI service Docker image (picks up any ai-service/ code changes)..."
            sudo docker compose build ai-service \
              || sudo docker-compose build ai-service \
              || { echo "⚠️  AI service Docker build failed"; cd /home/ubuntu/Aniston-HRMS; }

            echo "Starting AI service container (--no-deps avoids conflicting postgres/redis containers)..."
            sudo docker compose up -d --no-deps --force-recreate ai-service \
              || sudo docker-compose up -d --no-deps --force-recreate ai-service \
              || echo "⚠️  AI service start failed"

            cd /home/ubuntu/Aniston-HRMS

            # Wait up to 90 s for the service to become healthy (it needs to load OCR models)
            echo "Waiting for AI service health check (up to 90s)..."
            AI_HEALTHY=false
            for attempt in $(seq 1 18); do
              sleep 5
              if curl -sf http://localhost:8000/ai/health > /dev/null 2>&1; then
                echo "✅ AI service healthy after $((attempt * 5))s"
                AI_HEALTHY=true
                break
              fi
              echo "  Attempt ${attempt}/18 — not ready yet..."
            done

            if [ "$AI_HEALTHY" != "true" ]; then
              echo "⚠️  AI service did not become healthy within 90s. Last container logs:"
              sudo docker logs aniston-ai-service --tail 50 2>/dev/null || true
              echo "Deployment continues — OCR will use Node.js fallback for single docs;"
              echo "combined KYC PDFs will be marked PENDING for manual HR review."
            fi

            echo "=== [9/17] Cleanup scripts ==="
            npx tsx scripts/cleanup-employees.ts || echo "Cleanup completed (or already clean)"
            npx tsx scripts/cleanup-holidays.ts || echo "Holiday cleanup skipped"

            echo "=== [10/17] Seeding database ==="
            npx --no-install prisma db seed || echo "Seed completed (or already seeded)"

            echo "=== [11/17] Building backend ==="
            npm run build --workspace=backend
            echo "✅ Backend compiled to backend/dist/"

            echo "=== [11.5/17] Building frontend ==="
            cd frontend && VITE_API_URL=/api npx vite build && cd ..

            echo "=== [12/17] Semantic versioning + OTA bundle ==="
            # Entire step runs in a subshell — any failure exits the subshell only,
            # never the outer deployment script. No set +e needed.
            (
              PREV_VERSION=$(curl -s http://localhost:4000/api/app-updates/latest 2>/dev/null | python3 -c "import sys,json;d=json.load(sys.stdin);v=d.get('data',{}).get('version','x');print(v if v and v[:1].isdigit() else '0.0.0')" 2>/dev/null || echo "0.0.0")
              PREV_VERSION=${PREV_VERSION:-0.0.0}
              echo "Previous live version: ${PREV_VERSION}"
              COMMIT_MSG=$(git log -1 --pretty=%B 2>/dev/null || echo "chore: update")
              COMMIT_SUBJECT=$(git log -1 --pretty=%s 2>/dev/null | python3 -c "import sys,re; s=sys.stdin.read().strip(); print(re.sub(r'[^a-zA-Z0-9 .:()\-_]','',s)[:72])" 2>/dev/null || echo "update")
              COMMIT_SUBJECT=${COMMIT_SUBJECT:-update}
              BUMP_TYPE="patch"
              if echo "$COMMIT_MSG" | grep -qiE "(BREAKING CHANGE|feat!|fix!|refactor!)"; then
                BUMP_TYPE="major"
              elif echo "$COMMIT_MSG" | grep -qE "^feat[:(]"; then
                BUMP_TYPE="minor"
              fi
              echo "Bump type: ${BUMP_TYPE}  (commit: ${COMMIT_SUBJECT})"
              BUNDLE_VERSION=$(python3 -c "v='${PREV_VERSION}'.split('.'); a,b,c=(int(v[i]) if len(v)>i else 0 for i in range(3)); t='${BUMP_TYPE}'; print(str(a+1)+'.0.0' if t=='major' else str(a)+'.'+str(b+1)+'.0' if t=='minor' else str(a)+'.'+str(b)+'.'+str(c+1))" 2>/dev/null || echo "1.0.0")
              echo "New version: ${BUNDLE_VERSION}"
              mkdir -p app-updates
              if [ -d "frontend/dist" ]; then
                (cd frontend/dist && zip -r "../../app-updates/bundle-${BUNDLE_VERSION}.zip" . -q)
                BUNDLE_SIZE=$(du -sh "app-updates/bundle-${BUNDLE_VERSION}.zip" 2>/dev/null | cut -f1 || echo "?")
                echo "Bundle v${BUNDLE_VERSION} created (${BUNDLE_SIZE})"
              else
                echo "WARNING: frontend/dist not found — skipping OTA zip"
              fi
              python3 -c "import json; m={'version':'${BUNDLE_VERSION}','url':'https://hr.anistonav.com/app-updates/bundle-${BUNDLE_VERSION}.zip','mandatory':True,'notes':'v${BUNDLE_VERSION} - ${COMMIT_SUBJECT}'}; open('app-updates/manifest.json','w').write(json.dumps(m,indent=2)); print('manifest.json updated to v${BUNDLE_VERSION}')" 2>/dev/null || echo "WARNING: manifest.json write failed"
              mkdir -p downloads downloads/agent/agent-build app-updates uploads/ios-builds
              chmod 755 downloads app-updates 2>/dev/null || true
            ) || echo "WARNING: OTA versioning step failed (non-blocking) — deployment continues"

            echo "=== [13/17] Verifying app binaries ==="
            ls -lh downloads/aniston-hrms.apk 2>/dev/null && echo "✅ Android APK present" || echo "ℹ️  Android APK not yet uploaded (will appear after first successful android build)"
            ls -lh uploads/ios-builds/*.ipa 2>/dev/null && echo "✅ iOS IPA present" || echo "ℹ️  iOS IPA not yet uploaded"
            ls -lh downloads/agent/agent-build/aniston-agent-setup.exe 2>/dev/null && echo "✅ Agent .exe present" || echo "ℹ️  Agent installer not yet uploaded (will appear after first successful windows build)"

            echo "=== [14/17] Updating Nginx config ==="
            sudo cp /home/ubuntu/Aniston-HRMS/deploy/nginx.conf /etc/nginx/sites-available/hr.anistonav.com
            sudo ln -sf /etc/nginx/sites-available/hr.anistonav.com /etc/nginx/sites-enabled/hr.anistonav.com
            sudo nginx -t && sudo systemctl reload nginx || echo "WARNING: Nginx reload failed"

            echo "=== [15/17] Checking uploads directory ==="
            mkdir -p /home/ubuntu/Aniston-HRMS/uploads
            mkdir -p /home/ubuntu/Aniston-HRMS/uploads/backups
            mkdir -p /home/ubuntu/Aniston-HRMS/uploads/tmp
            mkdir -p /home/ubuntu/Aniston-HRMS/downloads/agent/agent-build

            echo "=== [15.5/17] Setting server timezone to UTC ==="
            sudo timedatectl set-timezone UTC || true
            echo "Server time: $(date)"

            echo "=== [16/17] Restarting backend via PM2 ==="
            mkdir -p /home/ubuntu/Aniston-HRMS/logs
            # pm2 restart = full stop+start to ensure all new code + env changes take effect
            # Falls back to fresh start if app is not yet registered (first deploy)
            if pm2 show aniston-hrms > /dev/null 2>&1; then
              pm2 restart aniston-hrms --update-env
              echo "✅ Backend restarted"
            else
              echo "ℹ️  App not found in PM2 — starting fresh via ecosystem config"
              pm2 start ecosystem.config.cjs --env production 2>/dev/null || \
              pm2 start backend/dist/server.js --name aniston-hrms
            fi
            pm2 save --force
            # Wait for process to be fully ready (up to 30s)
            echo "Waiting for backend to come online..."
            for i in $(seq 1 12); do
              sleep 3
              STATUS=$(curl -sf http://localhost:4000/api/health 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('data',{}).get('status','?'))" 2>/dev/null || echo "starting")
              echo "  [$((i*3))s] backend status: $STATUS"
              if [ "$STATUS" = "ok" ]; then echo "✅ Backend is live!"; break; fi
            done

            echo "=== [17/17] Health checks ==="
            echo "Backend API:"
            curl -s http://localhost:4000/api/health | python3 -c "import sys,json; d=json.load(sys.stdin); print('Status:', d.get('data',{}).get('status','?'))" || curl -s http://localhost:4000/api/health
            echo ""
            echo "OTA update endpoint:"
            curl -s http://localhost:4000/api/app-updates/latest | python3 -c "import sys,json; d=json.load(sys.stdin); print('Latest bundle:', d.get('data',{}).get('version','?'))" || echo "Check manually"
            echo ""
            echo "AI Service:"
            AI_STATUS=$(curl -sf http://localhost:8000/ai/health 2>/dev/null && echo "✅ Running" || echo "⚠️  Not running — OCR uses Node.js fallback (combined KYC PDFs need manual HR review)")
            echo "$AI_STATUS"
            echo "AI container status: $(sudo docker ps --filter name=aniston-ai-service --format '{{.Status}}' 2>/dev/null || echo 'unknown')"
            echo ""
            echo "PM2 process list:"
            pm2 list
            echo ""
            echo "Last 15 backend log lines:"
            pm2 logs aniston-hrms --nostream --lines 15 2>/dev/null || true
            echo ""
            echo "=== Deploy complete! Bundle v${{ github.run_number }} live. ==="
