name: Build & Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx --no-install prisma generate

      - name: Build backend
        run: npm run build --workspace=backend

      - name: Build frontend
        run: cd frontend && npx vite build
        env:
          VITE_API_URL: /api

      - name: Run tests
        run: npm run test --workspace=backend
        env:
          JWT_SECRET: test-secret-key-that-is-at-least-32-characters-long-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-that-is-at-least-32-characters-long
          ENCRYPTION_KEY: test-encryption-key-at-least-32-chars-long!!
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          timeout: 300s
          script: |
            cd /home/ubuntu/Aniston-HRMS
            echo "=== [1/14] Pre-deployment backup ==="
            bash scripts/pre-deploy-backup.sh || echo "WARNING: Backup failed but continuing..."

            echo "=== [2/14] Installing system dependencies ==="
            sudo apt-get update -qq
            # Chromium for Puppeteer (PDF generation)
            sudo apt-get install -y -qq chromium-browser || sudo apt-get install -y -qq chromium || true
            sudo apt-get install -y -qq \
              libatk1.0-0 libatk-bridge2.0-0 libcups2 libxdamage1 libxrandr2 \
              libgbm1 libpango-1.0-0 libcairo2 libnspr4 libnss3 libxss1 \
              libxtst6 xdg-utils fonts-liberation \
              libasound2t64 || sudo apt-get install -y -qq libasound2 || true
            # PostgreSQL client for database backups
            sudo apt-get install -y -qq postgresql-client || true
            # Docker + Docker Compose (for AI service)
            which docker || (curl -fsSL https://get.docker.com | sudo sh && sudo usermod -aG docker ubuntu) || true
            which docker-compose || sudo apt-get install -y -qq docker-compose-plugin || true
            which chromium-browser || which chromium || which google-chrome-stable || echo "WARNING: No system Chrome found"

            echo "=== [3/14] Pulling latest code ==="
            git pull origin main

            echo "=== [4/14] Setting production domain in .env ==="
            sed -i '/FRONTEND_URL/d' .env 2>/dev/null || true
            sed -i '/API_URL/d' .env 2>/dev/null || true
            sed -i -e '$a\' .env 2>/dev/null || true
            echo 'FRONTEND_URL=https://hr.anistonav.com' >> .env
            echo 'API_URL=https://hr.anistonav.com' >> .env

            echo "=== [5/14] Installing Node.js dependencies ==="
            export SCARF_ANALYTICS=false
            npm ci || (echo "Retrying npm ci..." && rm -rf node_modules && npm ci)

            echo "=== [6/14] Generating Prisma client ==="
            npx --no-install prisma generate

            echo "=== [7/14] Syncing database schema ==="
            # Use db push (safe mode, no --accept-data-loss) until migrations are baselined.
            # This refuses changes that would cause data loss — safe for production.
            # TODO: Baseline existing DB with `prisma migrate diff` and switch to `migrate deploy`
            npx --no-install prisma db push

            echo "=== [8/14] Building & starting AI service (Docker) ==="
            if command -v docker &> /dev/null; then
              cd docker
              docker compose build ai-service 2>/dev/null || docker-compose build ai-service 2>/dev/null || echo "WARNING: AI service Docker build failed"
              docker compose up -d ai-service 2>/dev/null || docker-compose up -d ai-service 2>/dev/null || echo "WARNING: AI service Docker start failed"
              cd ..
              echo "Waiting for AI service..."
              sleep 5
              curl -s http://localhost:8000/ai/health || echo "WARNING: AI service not responding (OCR will use fallback)"
            else
              echo "WARNING: Docker not available — AI service (OCR) will not run"
            fi

            echo "=== [9/14] Cleaning up old employees + auto-seeded holidays ==="
            npx tsx scripts/cleanup-employees.ts || echo "Cleanup completed (or already clean)"
            # Remove auto-seeded holidays (HR adds manually now)
            npx tsx -e "
              const { PrismaClient } = require('@prisma/client');
              const p = new PrismaClient();
              p.holiday.deleteMany({ where: { createdBy: null } }).then(r => {
                console.log('Deleted ' + r.count + ' auto-seeded holidays');
                p.\$disconnect();
              }).catch(() => p.\$disconnect());
            " || echo "Holiday cleanup skipped"

            echo "=== [10/14] Seeding database ==="
            npx --no-install prisma db seed || echo "Seed completed (or already seeded)"

            echo "=== [11/14] Building frontend ==="
            cd frontend && VITE_API_URL=/api npx vite build && cd ..

            echo "=== [12/14] Updating Nginx config ==="
            sudo cp /home/ubuntu/Aniston-HRMS/deploy/nginx.conf /etc/nginx/sites-available/hr.anistonav.com
            sudo ln -sf /etc/nginx/sites-available/hr.anistonav.com /etc/nginx/sites-enabled/hr.anistonav.com
            sudo nginx -t && sudo systemctl reload nginx || echo "WARNING: Nginx reload failed"

            echo "=== [13/14] Checking uploads directory ==="
            mkdir -p /home/ubuntu/Aniston-HRMS/uploads
            echo "Uploads in project root:"
            find /home/ubuntu/Aniston-HRMS/uploads -type f 2>/dev/null | head -10 || echo "(none)"

            echo "=== [14/15] Setting server timezone to UTC ==="
            sudo timedatectl set-timezone UTC || true
            echo "Server time: $(date)"
            echo "UTC time: $(date -u)"

            echo "=== [15/15] Restarting PM2 ==="
            pm2 restart aniston-hrms
            echo "=== Waiting for startup ==="
            sleep 5

            echo "=== Health checks ==="
            echo "Backend:"
            curl -s http://localhost:4000/api/health
            echo ""
            echo "AI Service:"
            curl -s http://localhost:8000/ai/health || echo "Not running (OCR uses fallback)"
            echo ""
            echo "=== Deploy complete! ==="
