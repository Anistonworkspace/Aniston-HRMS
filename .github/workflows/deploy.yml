name: Build & Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build backend
        run: npm run build --workspace=backend
        continue-on-error: true

      - name: Build frontend
        run: cd frontend && npx vite build
        continue-on-error: true
        env:
          VITE_API_URL: /api

      - name: Run tests
        run: npm run test --workspace=backend
        continue-on-error: true
        env:
          JWT_SECRET: test-secret-key-that-is-at-least-32-characters-long-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-that-is-at-least-32-characters-long
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          timeout: 300s
          script: |
            cd /home/ubuntu/Aniston-HRMS
            echo "=== [1/8] Pre-deployment backup ==="
            bash scripts/pre-deploy-backup.sh || echo "WARNING: Backup failed but continuing..."
            echo "=== [2/8] Installing Chrome/Puppeteer dependencies ==="
            sudo apt-get update -qq
            # Install Chromium browser + all required shared libraries for Puppeteer
            sudo apt-get install -y -qq chromium-browser || sudo apt-get install -y -qq chromium || true
            sudo apt-get install -y -qq \
              libatk1.0-0 libatk-bridge2.0-0 libcups2 libxdamage1 libxrandr2 \
              libgbm1 libpango-1.0-0 libcairo2 libnspr4 libnss3 libxss1 \
              libxtst6 xdg-utils fonts-liberation \
              libasound2t64 || sudo apt-get install -y -qq libasound2 || true
            # Verify Chrome/Chromium is available
            which chromium-browser || which chromium || which google-chrome-stable || echo "WARNING: No system Chrome found, Puppeteer will use bundled Chrome"
            echo "=== [3/11] Pulling latest code ==="
            git pull origin main
            echo "=== [4/11] Setting production domain in .env ==="
            # Force FRONTEND_URL and API_URL to the correct domain (never IP)
            # Remove ALL lines containing FRONTEND_URL or API_URL (handles quotes, spaces, duplicates)
            sed -i '/FRONTEND_URL/d' .env 2>/dev/null || true
            sed -i '/API_URL/d' .env 2>/dev/null || true
            # Ensure file ends with newline before appending
            sed -i -e '$a\' .env 2>/dev/null || true
            echo 'FRONTEND_URL=https://hr.anistonav.com' >> .env
            echo 'API_URL=https://hr.anistonav.com' >> .env
            echo "=== [5/11] Installing dependencies ==="
            npm ci
            echo "=== [6/11] Generating Prisma client ==="
            npx prisma generate
            echo "=== [7/11] Pushing schema to DB ==="
            npx prisma db push --accept-data-loss
            echo "=== [8/11] Cleaning up old employees (keep SuperAdmin only) ==="
            npx tsx scripts/cleanup-employees.ts || echo "Cleanup completed (or already clean)"
            echo "=== [9/11] Seeding database (SuperAdmin + defaults) ==="
            npx prisma db seed || echo "Seed completed (or already seeded)"
            echo "=== [10/11] Building frontend ==="
            cd frontend && VITE_API_URL=/api npx vite build && cd ..
            echo "=== [11/12] Updating Nginx config ==="
            sudo cp /home/ubuntu/Aniston-HRMS/deploy/nginx.conf /etc/nginx/sites-available/hr.anistonav.com
            sudo ln -sf /etc/nginx/sites-available/hr.anistonav.com /etc/nginx/sites-enabled/hr.anistonav.com
            sudo nginx -t && sudo systemctl reload nginx || echo "WARNING: Nginx reload failed"
            echo "=== [12/13] Checking uploads directory ==="
            echo "Uploads in project root:"
            find /home/ubuntu/Aniston-HRMS/uploads -type f 2>/dev/null | head -20 || echo "(none)"
            echo "Uploads in backend/:"
            find /home/ubuntu/Aniston-HRMS/backend/uploads -type f 2>/dev/null | head -20 || echo "(none)"
            echo "=== [13/13] Restarting PM2 ==="
            pm2 restart aniston-hrms
            echo "=== Waiting for startup ==="
            sleep 5
            echo "=== Health check ==="
            curl -s http://localhost:4000/api/health
            echo ""
            echo "=== Upload file test ==="
            curl -s -o /dev/null -w "%{http_code}" http://localhost:4000/uploads/ || echo "N/A"
            echo ""
            echo "=== Deploy complete! ==="
