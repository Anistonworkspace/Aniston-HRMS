name: Build & Deploy to EC2

# ─────────────────────────────────────────────────────────────────────────────
# Triggers on every push to main and manual dispatch.
#
# Jobs:
#   build-agent      — always builds Windows Desktop Agent .exe
#   build-and-deploy — typecheck, test, build frontend+backend, deploy to EC2
#
# Mobile builds (.aab / .ipa) are built locally using Android Studio / Codemagic.
# See docs/BUILD_NATIVE_AAB.md for Android and docs/IOS_APP_STORE_RELEASE.md for iOS.
#
# Required GitHub Secrets:
#   EC2_HOST / EC2_USER / EC2_SSH_KEY / ENCRYPTION_KEY / REDIS_PASSWORD
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 0 — Tag current live version before deploy (enables rollback)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  pre-deploy-tag:
    name: Tag Pre-Deploy State
    runs-on: ubuntu-latest
    continue-on-error: true   # tag failure must never block the deploy
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create pre-deploy tag
        run: |
          TAG="pre-deploy-$(date +%Y%m%d-%H%M%S)"
          git config user.email "ci@anistonav.com"
          git config user.name "CI Deploy Bot"
          git tag "$TAG"
          # Push using the token-authenticated remote URL so GITHUB_TOKEN is honoured
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" "$TAG"
          echo "PRE_DEPLOY_TAG=$TAG" >> $GITHUB_ENV
          echo "Tagged current state as $TAG for rollback"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 1 — Windows Desktop Agent (.exe) — always builds on every push
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-agent:
    needs: [pre-deploy-tag]
    name: Build Desktop Agent (.exe)
    runs-on: windows-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install agent dependencies
        working-directory: agent-desktop
        run: npm ci

      - name: Build TypeScript
        working-directory: agent-desktop
        run: npm run build

      - name: Build Windows installer (.exe)
        working-directory: agent-desktop
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # API URL is now hardcoded to https://hr.anistonav.com/api in config.ts
          # Optional: TURN server for enterprise NAT traversal (set in GitHub secrets if needed)
          ANISTON_TURN_URL: ${{ secrets.ANISTON_TURN_URL || '' }}
          ANISTON_TURN_USERNAME: ${{ secrets.ANISTON_TURN_USERNAME || '' }}
          ANISTON_TURN_CREDENTIAL: ${{ secrets.ANISTON_TURN_CREDENTIAL || '' }}

      - name: Upload agent installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: aniston-agent-setup
          path: agent-desktop/build/aniston-agent-setup.exe
          retention-days: 30
          if-no-files-found: error


  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 2 — Build web, run tests, deploy to EC2
  #   • Typecheck + backend tests before deploy
  #   • Creates OTA bundle zip + bumps manifest.json for native-app updates
  #   • Uploads Desktop Agent .exe to EC2 if build-agent succeeded
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [build-agent]
    if: always()   # deploy even if build-agent fails

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx --no-install prisma generate

      - name: Build shared package
        run: npm run build --workspace=shared

      - name: Build backend
        run: npm run build --workspace=backend

      - name: Typecheck frontend (G-11 — catch TS errors before Vite build)
        run: npm run typecheck --workspace=frontend

      - name: Build frontend
        run: cd frontend && npx vite build
        env:
          VITE_API_URL: /api

      - name: Run tests
        run: npm run test --workspace=backend
        env:
          JWT_SECRET: test-secret-key-that-is-at-least-32-characters-long-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-that-is-at-least-32-characters-long
          ENCRYPTION_KEY: test-encryption-key-at-least-32-chars-long!!
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      # ── Download build artifacts ─────────────────────────────────────────

      - name: Download agent installer artifact
        if: needs.build-agent.result == 'success'
        id: download-agent
        uses: actions/download-artifact@v4
        with:
          name: aniston-agent-setup
          path: ./agent-build
        continue-on-error: true

      # ── SCP: push binaries to EC2 ────────────────────────────────────────

      # Create agent download directory BEFORE SCP so the target path exists
      - name: Prepare agent download directory on EC2
        if: steps.download-agent.outcome == 'success'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # Create both the parent and the agent-build/ subdirectory that scp-action writes into
          script: mkdir -p /home/ubuntu/Aniston-HRMS/downloads/agent/agent-build
        continue-on-error: true

      - name: Upload agent .exe to EC2
        if: steps.download-agent.outcome == 'success'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ./agent-build/aniston-agent-setup.exe
          target: /home/ubuntu/Aniston-HRMS/downloads/agent/
          strip_components: 1
        continue-on-error: true

      # ── Main SSH deployment ───────────────────────────────────────────────

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          # ── Required secrets ────────────────────────────────────────────────
          DEPLOY_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DEPLOY_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DEPLOY_JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          DEPLOY_ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          DEPLOY_REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          DEPLOY_OPENAI_KEY: ${{ secrets.ANISTON_TEST }}
          # ── Storage (S3 / MinIO) ─────────────────────────────────────────────
          DEPLOY_STORAGE_ENDPOINT: ${{ secrets.STORAGE_ENDPOINT }}
          DEPLOY_STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          DEPLOY_STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
          # ── Integrations ─────────────────────────────────────────────────────
          DEPLOY_MAPBOX_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
          DEPLOY_TEAMS_CLIENT_ID: ${{ secrets.TEAMS_CLIENT_ID }}
          DEPLOY_TEAMS_CLIENT_SECRET: ${{ secrets.TEAMS_CLIENT_SECRET }}
          DEPLOY_TEAMS_TENANT_ID: ${{ secrets.TEAMS_TENANT_ID }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DEPLOY_DATABASE_URL,DEPLOY_JWT_SECRET,DEPLOY_JWT_REFRESH_SECRET,DEPLOY_ENCRYPTION_KEY,DEPLOY_REDIS_PASSWORD,DEPLOY_OPENAI_KEY,DEPLOY_STORAGE_ENDPOINT,DEPLOY_STORAGE_ACCESS_KEY,DEPLOY_STORAGE_SECRET_KEY,DEPLOY_MAPBOX_TOKEN,DEPLOY_TEAMS_CLIENT_ID,DEPLOY_TEAMS_CLIENT_SECRET,DEPLOY_TEAMS_TENANT_ID
          script_stop: true
          timeout: 300s
          command_timeout: 30m
          script: |
            cd /home/ubuntu/Aniston-HRMS

            echo "=== [1/16] Pre-deployment backup ==="
            bash scripts/pre-deploy-backup.sh || echo "WARNING: Backup failed but continuing..."

            echo "=== [2/16] Installing system dependencies ==="
            # apt-get update can fail with exit 100 when mirror is mid-sync —
            # allow it to fail and proceed with cached package lists instead.
            sudo apt-get update -qq 2>&1 | grep -v "^E:" || true
            sudo apt-get install -y -qq --fix-missing chromium-browser || sudo apt-get install -y -qq --fix-missing chromium || true
            sudo apt-get install -y -qq --fix-missing \
              libatk1.0-0 libatk-bridge2.0-0 libcups2 libxdamage1 libxrandr2 \
              libgbm1 libpango-1.0-0 libcairo2 libnspr4 libnss3 libxss1 \
              libxtst6 xdg-utils fonts-liberation \
              libasound2t64 || sudo apt-get install -y -qq libasound2 || true
            sudo apt-get install -y -qq --fix-missing postgresql-client zip || true
            PG_DUMP_BIN=$(which pg_dump 2>/dev/null || true)
            if [ -n "$PG_DUMP_BIN" ]; then
              echo "pg_dump found at: $PG_DUMP_BIN ($(pg_dump --version))"
              grep -q 'PG_DUMP_PATH=' .env 2>/dev/null || echo "PG_DUMP_PATH=$PG_DUMP_BIN" >> .env
              grep -q 'PSQL_PATH=' .env 2>/dev/null || echo "PSQL_PATH=$(which psql 2>/dev/null || true)" >> .env
            fi
            which docker || (curl -fsSL https://get.docker.com | sudo sh && sudo usermod -aG docker ubuntu) || true
            which docker-compose || sudo apt-get install -y -qq docker-compose-plugin || true

            echo "=== [3/16] Pulling latest code ==="
            # Reset any local server changes (e.g. manual edits to docker-compose.yml
            # made during debugging) so git pull never aborts with "overwritten by merge"
            git fetch origin main
            git reset --hard origin/main

            echo "=== [3.5/17] Ensuring Docker services (postgres + redis) are running ==="
            cd /home/ubuntu/Aniston-HRMS/docker
            # 'up -d' is idempotent: starts containers if stopped, no-ops if already running.
            # 'restart' only works on already-running containers — we use 'up -d' to be safe.
            sudo docker compose up -d postgres redis 2>/dev/null \
              || sudo docker-compose up -d postgres redis 2>/dev/null \
              || echo "⚠️  Docker start failed — postgres/redis may already be running natively"
            # Wait up to 30s for postgres — try docker container first, then native port
            echo "Waiting for PostgreSQL to become ready..."
            for i in $(seq 1 10); do
              sleep 3
              if sudo docker compose exec -T postgres pg_isready -U postgres 2>/dev/null \
                 || sudo docker-compose exec -T postgres pg_isready -U postgres 2>/dev/null \
                 || pg_isready -h localhost -p 5432 2>/dev/null; then
                echo "✅ PostgreSQL ready after $((i*3))s"
                break
              fi
              echo "  [$((i*3))s] waiting for postgres..."
            done
            cd /home/ubuntu/Aniston-HRMS

            echo "=== [4/17] Writing .env from GitHub Secrets ==="
            if [ -z "$DEPLOY_DATABASE_URL" ];       then echo "Missing DATABASE_URL secret";    exit 1; fi
            if [ -z "$DEPLOY_JWT_SECRET" ];         then echo "Missing JWT_SECRET secret";      exit 1; fi
            if [ -z "$DEPLOY_JWT_REFRESH_SECRET" ]; then echo "Missing JWT_REFRESH_SECRET";     exit 1; fi
            if [ -z "$DEPLOY_ENCRYPTION_KEY" ];     then echo "Missing ENCRYPTION_KEY secret";  exit 1; fi
            if [ -z "$DEPLOY_REDIS_PASSWORD" ];     then echo "Missing REDIS_PASSWORD secret";  exit 1; fi
            {
              echo "NODE_ENV=production"
              echo "PORT=4000"
              echo "FRONTEND_URL=https://hr.anistonav.com"
              echo "API_URL=https://hr.anistonav.com"
              echo "AI_SERVICE_URL=http://localhost:8000"
              echo "DATABASE_URL=$DEPLOY_DATABASE_URL"
              echo "REDIS_PASSWORD=$DEPLOY_REDIS_PASSWORD"
              echo "REDIS_URL=redis://:$DEPLOY_REDIS_PASSWORD@127.0.0.1:6379"
              echo "JWT_SECRET=$DEPLOY_JWT_SECRET"
              echo "JWT_REFRESH_SECRET=$DEPLOY_JWT_REFRESH_SECRET"
              echo "JWT_ACCESS_EXPIRY=15m"
              echo "JWT_REFRESH_EXPIRY=7d"
              echo "ENCRYPTION_KEY=$DEPLOY_ENCRYPTION_KEY"
              echo "SMTP_HOST=smtp.office365.com"
              echo "SMTP_PORT=587"
              echo "SMTP_FROM=noreply@aniston.in"
              echo "STORAGE_BUCKET=aniston-hrms"
              echo "STORAGE_ENDPOINT=$DEPLOY_STORAGE_ENDPOINT"
              echo "STORAGE_ACCESS_KEY=$DEPLOY_STORAGE_ACCESS_KEY"
              echo "STORAGE_SECRET_KEY=$DEPLOY_STORAGE_SECRET_KEY"
              echo "OPENAI_API_KEY=$DEPLOY_OPENAI_KEY"
              echo "MAPBOX_ACCESS_TOKEN=$DEPLOY_MAPBOX_TOKEN"
              echo "TEAMS_CLIENT_ID=$DEPLOY_TEAMS_CLIENT_ID"
              echo "TEAMS_CLIENT_SECRET=$DEPLOY_TEAMS_CLIENT_SECRET"
              echo "TEAMS_TENANT_ID=$DEPLOY_TEAMS_TENANT_ID"
            } > .env
            echo "✅ .env written ($(wc -l < .env) lines)"

            echo "=== [5/17] Installing Node.js dependencies ==="
            export SCARF_ANALYTICS=false
            sudo rm -rf node_modules || true
            npm ci || (echo "Retrying npm ci..." && sudo rm -rf node_modules && npm ci)
            node -e "import('tar').then(t => console.log('✅ tar package OK:', typeof t.create)).catch(e => console.error('❌ tar missing:', e.message))" || true

            echo "=== [6/17] Syncing database schema ==="
            # Drop ShiftType_old if it exists as a leftover from a previously
            # interrupted ALTER TYPE migration — Prisma errors if it tries to
            # drop a type that doesn't exist, so we clean it up first.
            # Use semicolon (not ||) — drone-ssh -e -o pipefail ignores exit codes after ;
            sudo docker exec aph-postgres psql -U aniston -d aniston_hrms -c "DROP TYPE IF EXISTS \"ShiftType_old\";" 2>&1; echo "ShiftType_old cleanup done (exit ignored)"

            # ── Pre-apply schema changes that cannot run inside a Prisma transaction ──
            # ALTER TYPE ADD VALUE and ALTER TYPE RENAME cannot run inside transactions.
            # Prisma migrate deploy wraps each migration in BEGIN/COMMIT, which causes
            # these statements to fail with "cannot run inside a transaction block".
            # We run them here explicitly via psql (outside any transaction) so that
            # when migrate deploy runs, the schema already has these changes and the
            # migrations are marked as applied by the resolve --applied calls below.
            if command -v psql &>/dev/null && [ -n "$DEPLOY_DATABASE_URL" ]; then
              # EmployeeStatus INTERN enum value
              psql "$DEPLOY_DATABASE_URL" -c "ALTER TYPE \"EmployeeStatus\" ADD VALUE IF NOT EXISTS 'INTERN' AFTER 'PROBATION';" 2>/dev/null || true
              # AnomalyType new enum values
              psql "$DEPLOY_DATABASE_URL" -c "ALTER TYPE \"AnomalyType\" ADD VALUE IF NOT EXISTS 'GPS_NO_DATA';" 2>/dev/null || true
              psql "$DEPLOY_DATABASE_URL" -c "ALTER TYPE \"AnomalyType\" ADD VALUE IF NOT EXISTS 'GPS_HEARTBEAT_MISSED';" 2>/dev/null || true
              psql "$DEPLOY_DATABASE_URL" -c "ALTER TYPE \"AnomalyType\" ADD VALUE IF NOT EXISTS 'GPS_GAP';" 2>/dev/null || true
              psql "$DEPLOY_DATABASE_URL" -c "ALTER TYPE \"AnomalyType\" ADD VALUE IF NOT EXISTS 'GPS_SIGNAL_LOST';" 2>/dev/null || true
              echo "✅ Pre-applied enum ADD VALUE changes outside transaction"
            fi

            # ── Baseline: mark all known migrations as applied ──
            # resolve --applied is idempotent — it silently errors if already marked.
            # Running this unconditionally ensures every migration that was applied via
            # db:push (without creating a migration history record) gets a history entry,
            # so migrate deploy has nothing left to do and exits 0.
            echo "Ensuring all known migrations are marked as applied..."
            for migration in \
              20260413000000_add_leave_settings_intern_role \
              20260413000001_add_leave_applicable_employees \
              20260429000000_gps_indexes_consent \
              20260502000000_leave_policy_engine \
              20260503000000_leave_balance_breakdown \
              20260503000001_leave_policy_max_paid_per_month \
              20260503000002_attendance_shift_snapshot_and_indexes \
              20260503000003_remove_hybrid_shift_type \
              20260506000000_add_leave_condition_messages \
              20260506000001_leave_unpaid_tracking \
              20260511000000_expand_hr_action_restrictions \
              20260511000001_add_gps_no_data_anomaly_type \
              20260511000002_add_gps_v1_5_5_tracking_fields; do
              npx prisma migrate resolve --applied "$migration" --schema=prisma/schema.prisma 2>/dev/null || true
            done
            echo "✅ Migration baseline complete"

            # Production: uses migrate deploy (NOT db push) to preserve data.
            # After the resolve loop above, migrate deploy only applies truly NEW
            # migrations (ones added after this deploy) — exits 0 if nothing is pending.
            npx prisma migrate deploy --schema=prisma/schema.prisma
            echo "✅ Schema migration complete"

            echo "=== [6.4/17] Running INTERN employee status + leave settings enum migration ==="
            # Adds INTERN to EmployeeStatus PostgreSQL enum + leave type columns.
            # ALTER TYPE ADD VALUE cannot run inside a transaction — this explicit step ensures
            # the enum exists in production even if migrate deploy skips it due to a prior partial sync.
            if command -v psql &>/dev/null && [ -n "$DEPLOY_DATABASE_URL" ]; then
              psql "$DEPLOY_DATABASE_URL" \
                -f "prisma/migrations/20260413000000_add_leave_settings_intern_role/migration.sql" \
                2>/dev/null || true
              psql "$DEPLOY_DATABASE_URL" \
                -f "prisma/migrations/20260413000001_add_leave_applicable_employees/migration.sql" \
                2>/dev/null || true
              echo "✅ INTERN enum + leave settings migration complete"
            else
              echo "psql not available or DATABASE_URL not set — skipping INTERN enum migration"
            fi

            echo "=== [6.5/17] Running leave policy data migration SQL ==="
            # Runs the migration file via psql -f (avoids heredoc << in YAML).
            # psql continues past 'already exists' errors by default — safe to re-run.
            # Suppresses stderr so re-run 'already exists' noise doesn't clutter logs.
            if command -v psql &>/dev/null && [ -n "$DEPLOY_DATABASE_URL" ]; then
              psql "$DEPLOY_DATABASE_URL" \
                -f "prisma/migrations/20260502000000_leave_policy_engine/migration.sql" \
                2>/dev/null || true
              echo "✅ Leave policy data migration complete"
            else
              echo "psql not available or DATABASE_URL not set — skipping leave policy data migration"
            fi

            echo "=== [6.6/17] Running leave balance breakdown migration SQL ==="
            if command -v psql &>/dev/null && [ -n "$DEPLOY_DATABASE_URL" ]; then
              psql "$DEPLOY_DATABASE_URL" \
                -f "prisma/migrations/20260503000000_leave_balance_breakdown/migration.sql" \
                2>/dev/null || true
              echo "✅ Leave balance breakdown migration complete"
            else
              echo "psql not available or DATABASE_URL not set — skipping leave balance breakdown migration"
            fi

            echo "=== [6.7/17] Running leave policy maxPaidLeavesPerMonth + attendance shift snapshot migrations ==="
            # These are schema-only migrations (all guards use IF NOT EXISTS) and are also
            # covered by migrate deploy above — running them here ensures idempotent explicit tracking.
            if command -v psql &>/dev/null && [ -n "$DEPLOY_DATABASE_URL" ]; then
              psql "$DEPLOY_DATABASE_URL" \
                -f "prisma/migrations/20260503000001_leave_policy_max_paid_per_month/migration.sql" \
                2>/dev/null || true
              psql "$DEPLOY_DATABASE_URL" \
                -f "prisma/migrations/20260503000002_attendance_shift_snapshot_and_indexes/migration.sql" \
                2>/dev/null || true
              echo "✅ Leave policy cap + attendance snapshot migrations complete"
            else
              echo "psql not available or DATABASE_URL not set — skipping"
            fi

            echo "=== [6.8/17] Running LeaveConditionMessage migration ==="
            if command -v psql &>/dev/null && [ -n "$DEPLOY_DATABASE_URL" ]; then
              psql "$DEPLOY_DATABASE_URL" \
                -f "prisma/migrations/20260506000000_add_leave_condition_messages/migration.sql" \
                2>/dev/null || true
              echo "✅ LeaveConditionMessage table migration complete"
            else
              echo "psql not available or DATABASE_URL not set — skipping"
            fi

            echo "=== [6.9/17] Running leave unpaid tracking migration ==="
            if command -v psql &>/dev/null && [ -n "$DEPLOY_DATABASE_URL" ]; then
              psql "$DEPLOY_DATABASE_URL" \
                -f "prisma/migrations/20260506000001_leave_unpaid_tracking/migration.sql" \
                2>/dev/null || true
              echo "✅ Leave unpaid tracking columns migration complete"
            else
              echo "psql not available or DATABASE_URL not set — skipping"
            fi

            echo "=== [7/17] Generating Prisma client (after schema sync) ==="
            npx --no-install prisma generate
            echo "✅ Prisma client regenerated"

            echo "=== [8/17] Building & starting AI service (Docker + OCR) ==="
            # Entire AI service section runs in a subshell — any failure is non-blocking.
            # OCR falls back to Node.js for single docs; combined KYC PDFs go to PENDING.
            (
              sudo apt-get install -y -qq --fix-missing tesseract-ocr tesseract-ocr-eng poppler-utils || true

              if ! command -v docker &>/dev/null; then
                echo "Docker not found — installing..."
                curl -fsSL https://get.docker.com | sudo sh
                sudo usermod -aG docker ubuntu
              fi

              sudo systemctl start docker || true
              if ! sudo docker info > /dev/null 2>&1; then
                echo "⚠️  Docker daemon not accessible — skipping AI service"
                exit 0
              fi

              cd /home/ubuntu/Aniston-HRMS/docker || exit 0

              touch /home/ubuntu/Aniston-HRMS/docker/.env || true
              sed -i '/^AI_SERVICE_API_KEY=/d' /home/ubuntu/Aniston-HRMS/docker/.env 2>/dev/null || true
              if [ -n "${{ secrets.AI_SERVICE_API_KEY }}" ]; then
                echo "AI_SERVICE_API_KEY=${{ secrets.AI_SERVICE_API_KEY }}" >> /home/ubuntu/Aniston-HRMS/docker/.env
                echo "✅ docker/.env: AI_SERVICE_API_KEY set from secret"
              else
                RAND_KEY=$(openssl rand -hex 32)
                echo "AI_SERVICE_API_KEY=${RAND_KEY}" >> /home/ubuntu/Aniston-HRMS/docker/.env
                echo "⚠️  AI_SERVICE_API_KEY not set — using generated key"
              fi

              echo "Building AI service Docker image..."
              sudo docker compose build ai-service \
                || sudo docker-compose build ai-service \
                || { echo "⚠️  AI service build failed — skipping"; exit 0; }

              echo "Starting AI service container..."
              sudo docker compose up -d --no-deps --force-recreate ai-service \
                || sudo docker-compose up -d --no-deps --force-recreate ai-service \
                || echo "⚠️  AI service start failed"

              cd /home/ubuntu/Aniston-HRMS || true

              echo "Waiting for AI service (up to 90s)..."
              for attempt in $(seq 1 18); do
                sleep 5
                if curl -sf http://localhost:8000/ai/health > /dev/null 2>&1; then
                  echo "✅ AI service healthy after $((attempt * 5))s"
                  exit 0
                fi
                echo "  Attempt ${attempt}/18 — not ready yet..."
              done
              echo "⚠️  AI service did not become healthy — OCR uses Node.js fallback"
              sudo docker logs aniston-ai-service --tail 30 2>/dev/null || true
            ) || echo "⚠️  AI service setup failed (non-blocking) — deployment continues"
            cd /home/ubuntu/Aniston-HRMS || true

            echo "=== [9/17] Cleanup scripts ==="
            # cleanup-employees.ts is intentionally NOT called here.
            # It only deletes demo@anistonav.com and must be run manually on the server:
            #   npx tsx scripts/cleanup-employees.ts
            npx tsx scripts/cleanup-holidays.ts; echo "Holiday cleanup done (exit ignored)"

            echo "=== [10/17] Seeding database ==="
            # Always skip seed on production deploy — seed only runs manually when ALLOW_PROD_SEED=true
            # is set directly on the server. Auto-seeding production risks overwriting real data.
            if [ "${ALLOW_PROD_SEED}" = "true" ]; then
              npx tsx prisma/seed.ts
            else
              echo "Skipping seed in production (run manually with ALLOW_PROD_SEED=true to override)"
            fi

            echo "=== [11/17] Building shared + backend ==="
            npm run build --workspace=shared
            npm run build --workspace=backend
            echo "✅ Shared + Backend compiled to backend/dist/"

            echo "=== [11.5/17] Building frontend ==="
            cd frontend && VITE_API_URL=/api npx vite build && cd ..

            echo "=== [12/17] Semantic versioning + OTA bundle ==="
            # Entire step runs in a subshell — any failure exits the subshell only,
            # never the outer deployment script. No set +e needed.
            (
              PREV_VERSION=$(curl -s http://localhost:4000/api/app-updates/latest 2>/dev/null | python3 -c "import sys,json;d=json.load(sys.stdin);v=d.get('data',{}).get('version','x');print(v if v and v[:1].isdigit() else '0.0.0')" 2>/dev/null || echo "0.0.0")
              PREV_VERSION=${PREV_VERSION:-0.0.0}
              echo "Previous live version: ${PREV_VERSION}"
              COMMIT_MSG=$(git log -1 --pretty=%B 2>/dev/null || echo "chore: update")
              COMMIT_SUBJECT=$(git log -1 --pretty=%s 2>/dev/null | python3 -c "import sys,re; s=sys.stdin.read().strip(); print(re.sub(r'[^a-zA-Z0-9 .:()\-_]','',s)[:72])" 2>/dev/null || echo "update")
              COMMIT_SUBJECT=${COMMIT_SUBJECT:-update}
              BUMP_TYPE="patch"
              if echo "$COMMIT_MSG" | grep -qiE "(BREAKING CHANGE|feat!|fix!|refactor!)"; then
                BUMP_TYPE="major"
              elif echo "$COMMIT_MSG" | grep -qE "^feat[:(]"; then
                BUMP_TYPE="minor"
              fi
              echo "Bump type: ${BUMP_TYPE}  (commit: ${COMMIT_SUBJECT})"
              BUNDLE_VERSION=$(python3 -c "v='${PREV_VERSION}'.split('.'); a,b,c=(int(v[i]) if len(v)>i else 0 for i in range(3)); t='${BUMP_TYPE}'; print(str(a+1)+'.0.0' if t=='major' else str(a)+'.'+str(b+1)+'.0' if t=='minor' else str(a)+'.'+str(b)+'.'+str(c+1))" 2>/dev/null || echo "1.0.0")
              echo "New version: ${BUNDLE_VERSION}"
              mkdir -p app-updates
              if [ -d "frontend/dist" ]; then
                (cd frontend/dist && zip -r "../../app-updates/bundle-${BUNDLE_VERSION}.zip" . -q)
                BUNDLE_SIZE=$(du -sh "app-updates/bundle-${BUNDLE_VERSION}.zip" 2>/dev/null | cut -f1 || echo "?")
                echo "Bundle v${BUNDLE_VERSION} created (${BUNDLE_SIZE})"
              else
                echo "WARNING: frontend/dist not found — skipping OTA zip"
              fi
              python3 -c "import json; m={'version':'${BUNDLE_VERSION}','url':'https://hr.anistonav.com/app-updates/bundle-${BUNDLE_VERSION}.zip','mandatory':True,'notes':'v${BUNDLE_VERSION} - ${COMMIT_SUBJECT}'}; open('app-updates/manifest.json','w').write(json.dumps(m,indent=2)); print('manifest.json updated to v${BUNDLE_VERSION}')" 2>/dev/null || echo "WARNING: manifest.json write failed"
              mkdir -p downloads downloads/agent/agent-build app-updates
              chmod 755 downloads app-updates 2>/dev/null || true
            ) || echo "WARNING: OTA versioning step failed (non-blocking) — deployment continues"

            echo "=== [13/17] Verifying app binaries ==="
            ls -lh downloads/agent/agent-build/aniston-agent-setup.exe 2>/dev/null && echo "✅ Agent .exe present" || echo "ℹ️  Agent installer not yet uploaded (will appear after first successful windows build)"

            echo "=== [14/17] Updating Nginx config ==="
            sudo cp /home/ubuntu/Aniston-HRMS/deploy/nginx.conf /etc/nginx/sites-available/hr.anistonav.com
            sudo ln -sf /etc/nginx/sites-available/hr.anistonav.com /etc/nginx/sites-enabled/hr.anistonav.com
            sudo nginx -t && sudo systemctl reload nginx || echo "WARNING: Nginx reload failed"

            echo "=== [15/17] Checking uploads directory ==="
            mkdir -p /home/ubuntu/Aniston-HRMS/uploads
            mkdir -p /home/ubuntu/Aniston-HRMS/uploads/backups
            mkdir -p /home/ubuntu/Aniston-HRMS/uploads/tmp
            mkdir -p /home/ubuntu/Aniston-HRMS/downloads/agent/agent-build

            echo "=== [15.5/17] Setting server timezone to UTC ==="
            sudo timedatectl set-timezone UTC || true
            echo "Server time: $(date)"

            echo "=== [16/17] Restarting backend via PM2 ==="
            mkdir -p /home/ubuntu/Aniston-HRMS/logs
            # pm2 restart = full stop+start to ensure all new code + env changes take effect
            # Falls back to fresh start if app is not yet registered (first deploy)
            if pm2 show aniston-hrms > /dev/null 2>&1; then
              pm2 restart aniston-hrms --update-env
              echo "✅ Backend restarted"
            else
              echo "ℹ️  App not found in PM2 — starting fresh via ecosystem config"
              pm2 start ecosystem.config.cjs --env production 2>/dev/null || \
              pm2 start backend/dist/server.js --name aniston-hrms
            fi
            pm2 save --force
            # Wait for process to be fully ready (up to 30s)
            echo "Waiting for backend to come online..."
            for i in $(seq 1 12); do
              sleep 3
              STATUS=$(curl -sf http://localhost:4000/api/health 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('data',{}).get('status','?'))" 2>/dev/null || echo "starting")
              echo "  [$((i*3))s] backend status: $STATUS"
              if [ "$STATUS" = "ok" ]; then echo "✅ Backend is live!"; break; fi
            done

            echo "=== [17/17] Health checks ==="
            echo "Backend API:"
            curl -s http://localhost:4000/api/health | python3 -c "import sys,json; d=json.load(sys.stdin); print('Status:', d.get('data',{}).get('status','?'))" || curl -s http://localhost:4000/api/health
            echo ""
            echo "OTA update endpoint:"
            curl -s http://localhost:4000/api/app-updates/latest | python3 -c "import sys,json; d=json.load(sys.stdin); print('Latest bundle:', d.get('data',{}).get('version','?'))" || echo "Check manually"
            echo ""
            echo "AI Service:"
            AI_STATUS=$(curl -sf http://localhost:8000/ai/health 2>/dev/null && echo "✅ Running" || echo "⚠️  Not running — OCR uses Node.js fallback (combined KYC PDFs need manual HR review)")
            echo "$AI_STATUS"
            echo "AI container status: $(sudo docker ps --filter name=aniston-ai-service --format '{{.Status}}' 2>/dev/null || echo 'unknown')"
            echo ""
            echo "PM2 process list:"
            pm2 list
            echo ""
            echo "Last 15 backend log lines:"
            pm2 logs aniston-hrms --nostream --lines 15 2>/dev/null || true
            echo ""
            echo "=== Deploy complete! Bundle v${{ github.run_number }} live. ==="


  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 3 — Automatic rollback if build-and-deploy fails
  #   Restores the previous known-good commit on EC2 and restarts PM2.
  #   Only runs when the deploy job actually fails (not if it's skipped).
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  rollback-on-failure:
    name: Rollback on Deploy Failure
    runs-on: ubuntu-latest
    needs: [build-and-deploy, pre-deploy-tag]
    if: failure() && needs.build-and-deploy.result == 'failure'

    steps:
      - name: Rollback EC2 to previous release
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 120s
          script: |
            echo "=== ROLLBACK TRIGGERED — deploy job failed ==="
            cd /home/ubuntu/Aniston-HRMS

            # Find the most recent pre-deploy tag
            PRE_TAG=$(git tag --list 'pre-deploy-*' --sort=-version:refname | head -1)
            if [ -z "$PRE_TAG" ]; then
              echo "ERROR: No pre-deploy tag found — cannot rollback automatically"
              echo "Manual rollback: git reset --hard HEAD~1 && pm2 restart aniston-hrms"
              exit 1
            fi

            echo "Rolling back to tag: $PRE_TAG"
            git fetch origin --tags
            git reset --hard "$PRE_TAG"

            echo "Reinstalling dependencies at rolled-back state..."
            npm ci --workspace=backend 2>/dev/null || npm ci
            npm run build --workspace=shared 2>/dev/null || true
            npm run build --workspace=backend 2>/dev/null || true

            echo "Restarting PM2 with rolled-back code..."
            pm2 restart aniston-hrms --update-env || pm2 reload aniston-hrms
            pm2 save --force

            sleep 5
            STATUS=$(curl -sf http://localhost:4000/api/health 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('data',{}).get('status','?'))" 2>/dev/null || echo "unknown")
            echo "Backend status after rollback: $STATUS"

            if [ "$STATUS" = "ok" ]; then
              echo "✅ ROLLBACK SUCCESSFUL — previous version is live"
            else
              echo "⚠️  Rollback completed but health check uncertain — manual verification required"
            fi
