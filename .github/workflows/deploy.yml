name: Build & Deploy to EC2

# ─────────────────────────────────────────────────────────────────────────────
# Triggers on every push to main and manual dispatch.
#
# Jobs:
#   build-agent      — always builds Windows Desktop Agent .exe
#   build-and-deploy — typecheck, test, build frontend+backend, deploy to EC2
#
# Mobile builds (.aab / .ipa) are built locally using Android Studio / Codemagic.
# See docs/BUILD_NATIVE_AAB.md for Android and docs/IOS_APP_STORE_RELEASE.md for iOS.
#
# Required GitHub Secrets:
#   EC2_HOST / EC2_USER / EC2_SSH_KEY / ENCRYPTION_KEY / REDIS_PASSWORD
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 0 — Tag current live version before deploy (enables rollback)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  pre-deploy-tag:
    name: Tag Pre-Deploy State
    runs-on: ubuntu-latest
    continue-on-error: true   # tag failure must never block the deploy
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create pre-deploy tag
        run: |
          TAG="pre-deploy-$(date +%Y%m%d-%H%M%S)"
          git config user.email "ci@anistonav.com"
          git config user.name "CI Deploy Bot"
          git tag "$TAG"
          # Push using the token-authenticated remote URL so GITHUB_TOKEN is honoured
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" "$TAG"
          echo "PRE_DEPLOY_TAG=$TAG" >> $GITHUB_ENV
          echo "Tagged current state as $TAG for rollback"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 1 — Windows Desktop Agent (.exe) — always builds on every push
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-agent:
    needs: [pre-deploy-tag]
    name: Build Desktop Agent (.exe)
    runs-on: windows-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install agent dependencies
        working-directory: agent-desktop
        run: npm ci

      - name: Build TypeScript
        working-directory: agent-desktop
        run: npm run build

      - name: Build Windows installer (.exe)
        working-directory: agent-desktop
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # API URL is now hardcoded to https://hr.anistonav.com/api in config.ts
          # Optional: TURN server for enterprise NAT traversal (set in GitHub secrets if needed)
          ANISTON_TURN_URL: ${{ secrets.ANISTON_TURN_URL || '' }}
          ANISTON_TURN_USERNAME: ${{ secrets.ANISTON_TURN_USERNAME || '' }}
          ANISTON_TURN_CREDENTIAL: ${{ secrets.ANISTON_TURN_CREDENTIAL || '' }}

      - name: Upload agent installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: aniston-agent-setup
          path: agent-desktop/build/aniston-agent-setup.exe
          retention-days: 30
          if-no-files-found: error


  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 2 — Build web, run tests, deploy to EC2
  #   • Typecheck + backend tests before deploy
  #   • Creates OTA bundle zip + bumps manifest.json for native-app updates
  #   • Uploads Desktop Agent .exe to EC2 if build-agent succeeded
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [build-agent]
    if: always()   # deploy even if build-agent fails

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx --no-install prisma generate

      - name: Build shared package
        run: npm run build --workspace=shared

      - name: Build backend
        run: npm run build --workspace=backend

      - name: Typecheck frontend (G-11 — catch TS errors before Vite build)
        run: npm run typecheck --workspace=frontend

      - name: Build frontend
        run: cd frontend && npx vite build
        env:
          VITE_API_URL: /api

      - name: Run tests
        run: npm run test --workspace=backend
        env:
          JWT_SECRET: test-secret-key-that-is-at-least-32-characters-long-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-that-is-at-least-32-characters-long
          ENCRYPTION_KEY: test-encryption-key-at-least-32-chars-long!!
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      # ── Download build artifacts ─────────────────────────────────────────

      - name: Download agent installer artifact
        if: needs.build-agent.result == 'success'
        id: download-agent
        uses: actions/download-artifact@v4
        with:
          name: aniston-agent-setup
          path: ./agent-build
        continue-on-error: true

      # ── SCP: push binaries to EC2 ────────────────────────────────────────

      # Create agent download directory BEFORE SCP so the target path exists
      - name: Prepare agent download directory on EC2
        if: steps.download-agent.outcome == 'success'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # Create both the parent and the agent-build/ subdirectory that scp-action writes into
          script: mkdir -p /home/ubuntu/Aniston-HRMS/downloads/agent/agent-build
        continue-on-error: true

      - name: Upload agent .exe to EC2
        if: steps.download-agent.outcome == 'success'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ./agent-build/aniston-agent-setup.exe
          target: /home/ubuntu/Aniston-HRMS/downloads/agent/
          strip_components: 1
        continue-on-error: true

      # ── Main SSH deployment ───────────────────────────────────────────────

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          # ── Required secrets ────────────────────────────────────────────────
          DEPLOY_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DEPLOY_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DEPLOY_JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          DEPLOY_ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          DEPLOY_REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          DEPLOY_OPENAI_KEY: ${{ secrets.ANISTON_TEST }}
          # ── Storage (S3 / MinIO) ─────────────────────────────────────────────
          DEPLOY_STORAGE_ENDPOINT: ${{ secrets.STORAGE_ENDPOINT }}
          DEPLOY_STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          DEPLOY_STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
          # ── Integrations ─────────────────────────────────────────────────────
          DEPLOY_MAPBOX_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
          DEPLOY_TEAMS_CLIENT_ID: ${{ secrets.TEAMS_CLIENT_ID }}
          DEPLOY_TEAMS_CLIENT_SECRET: ${{ secrets.TEAMS_CLIENT_SECRET }}
          DEPLOY_TEAMS_TENANT_ID: ${{ secrets.TEAMS_TENANT_ID }}
          DEPLOY_AI_SERVICE_API_KEY: ${{ secrets.AI_SERVICE_API_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DEPLOY_DATABASE_URL,DEPLOY_JWT_SECRET,DEPLOY_JWT_REFRESH_SECRET,DEPLOY_ENCRYPTION_KEY,DEPLOY_REDIS_PASSWORD,DEPLOY_OPENAI_KEY,DEPLOY_STORAGE_ENDPOINT,DEPLOY_STORAGE_ACCESS_KEY,DEPLOY_STORAGE_SECRET_KEY,DEPLOY_MAPBOX_TOKEN,DEPLOY_TEAMS_CLIENT_ID,DEPLOY_TEAMS_CLIENT_SECRET,DEPLOY_TEAMS_TENANT_ID,DEPLOY_AI_SERVICE_API_KEY
          script_stop: true
          timeout: 300s
          command_timeout: 30m
          script: bash /home/ubuntu/Aniston-HRMS/scripts/deploy-server.sh


  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 3 — Automatic rollback if build-and-deploy fails
  #   Restores the previous known-good commit on EC2 and restarts PM2.
  #   Only runs when the deploy job actually fails (not if it's skipped).
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  rollback-on-failure:
    name: Rollback on Deploy Failure
    runs-on: ubuntu-latest
    needs: [build-and-deploy, pre-deploy-tag]
    if: failure() && needs.build-and-deploy.result == 'failure'

    steps:
      - name: Rollback EC2 to previous release
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 120s
          script: |
            echo "=== ROLLBACK TRIGGERED — deploy job failed ==="
            cd /home/ubuntu/Aniston-HRMS

            # Fetch tags from GitHub FIRST so local repo has them
            git fetch origin --tags

            # Find the most recent pre-deploy tag
            PRE_TAG=$(git tag --list 'pre-deploy-*' --sort=-version:refname | head -1)
            if [ -z "$PRE_TAG" ]; then
              echo "ERROR: No pre-deploy tag found — cannot rollback automatically"
              echo "Manual rollback: git reset --hard HEAD~1 && pm2 restart aniston-hrms"
              exit 1
            fi

            echo "Rolling back to tag: $PRE_TAG"
            git reset --hard "$PRE_TAG"

            echo "Reinstalling dependencies at rolled-back state..."
            npm ci --workspace=backend 2>/dev/null || npm ci
            npm run build --workspace=shared 2>/dev/null || true
            npm run build --workspace=backend 2>/dev/null || true

            echo "Restarting PM2 with rolled-back code..."
            pm2 restart aniston-hrms --update-env || pm2 reload aniston-hrms
            pm2 save --force

            sleep 5
            STATUS=$(curl -sf http://localhost:4000/api/health 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('data',{}).get('status','?'))" 2>/dev/null || echo "unknown")
            echo "Backend status after rollback: $STATUS"

            if [ "$STATUS" = "ok" ]; then
              echo "✅ ROLLBACK SUCCESSFUL — previous version is live"
            else
              echo "⚠️  Rollback completed but health check uncertain — manual verification required"
            fi
