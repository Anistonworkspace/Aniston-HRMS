name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build shared
        run: npm run build --workspace=shared

      - name: Type check — Backend
        run: npx tsc --noEmit -p backend/tsconfig.json
        continue-on-error: true

      - name: Type check — Frontend
        run: npx tsc --noEmit -p frontend/tsconfig.app.json
        continue-on-error: true

      - name: Build backend
        run: npm run build --workspace=backend
        continue-on-error: true

      - name: Build frontend
        run: npm run build --workspace=frontend
        env:
          VITE_API_URL: /api

      - name: Run backend tests
        run: npm run test --workspace=backend
        continue-on-error: true
        env:
          JWT_SECRET: test-secret-key-that-is-at-least-32-characters-long-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-that-is-at-least-32-characters-long
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
