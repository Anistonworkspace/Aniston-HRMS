name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify key backend packages
        run: |
          # Confirm tar (files backup) and prisma are resolvable after install
          node -e "import('tar').then(t => console.log('✅ tar:', typeof t.create)).catch(e => { console.error('❌ tar missing'); process.exit(1); })"
          # Confirm Capacitor core is installed (needed by AppUpdateGuard in native app)
          node -e "import('@capacitor/core').then(() => console.log('✅ @capacitor/core OK')).catch(e => { console.error('❌ @capacitor/core missing:', e.message); process.exit(1); })" || \
            node -e "require('@capacitor/core') && console.log('✅ @capacitor/core OK')" || \
            (echo '⚠️  @capacitor/core not resolvable in test env — ok if it is frontend-only' && true)

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build backend
        run: npm run build --workspace=backend

      - name: Build frontend (Vite only, skip tsc)
        run: cd frontend && npx vite build
        env:
          VITE_API_URL: /api

      - name: Sync test database schema
        run: npx prisma db push --force-reset
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run backend tests
        run: npm run test --workspace=backend
        env:
          JWT_SECRET: test-secret-key-that-is-at-least-32-characters-long-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-that-is-at-least-32-characters-long
          ENCRYPTION_KEY: test-encryption-key-at-least-32-chars-long!!
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

  build-agent:
    name: Build Desktop Agent (.exe)
    runs-on: windows-latest
    # Only build agent on main branch pushes and manual triggers
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install agent dependencies
        working-directory: agent-desktop
        run: npm ci

      - name: Build TypeScript
        working-directory: agent-desktop
        run: npm run build

      - name: Build Windows installer (.exe)
        working-directory: agent-desktop
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload agent installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: aniston-agent-setup
          path: agent-desktop/build/aniston-agent-setup.exe
          retention-days: 30
          if-no-files-found: error

  deploy:
    name: Deploy to Production (EC2)
    runs-on: ubuntu-latest
    needs: build
    # Only deploy on pushes to main — not on PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 300s
          script: |
            set -e
            cd /home/ubuntu/Aniston-HRMS

            echo "⬇️  Pulling latest code..."
            git pull origin main

            echo "📦 Installing dependencies..."
            npm ci

            echo "🗄️  Syncing database schema..."
            npx prisma db push --accept-data-loss

            echo "🔧 Generating Prisma client..."
            npx prisma generate

            echo "🏗️  Building backend..."
            npm run build --workspace=backend

            echo "🎨 Building frontend..."
            npm run build --workspace=frontend

            echo "🔄 Restarting services..."
            pm2 restart all --update-env

            echo "✅ Deployment complete!"
