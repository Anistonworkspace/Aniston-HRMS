name: Build Android AAB (Play Store)

# ─────────────────────────────────────────────────────────────────────────────
# Triggered manually from the GitHub Actions tab.
#
# Builds a signed Android App Bundle (.aab) from the Capacitor project for
# upload to the Google Play Store. Background GPS works because:
#   • @capacitor-community/background-geolocation starts a Foreground Service
#     with a persistent notification, keeping the process alive when screen off.
#   • ACCESS_BACKGROUND_LOCATION is declared in AndroidManifest.xml so Android
#     continues delivering GPS positions even with Doze / battery saver active.
#
# Required GitHub Secrets (set in repo Settings → Secrets → Actions):
#   ANDROID_KEYSTORE_BASE64   — base64 of your .jks keystore file
#                               Generate: base64 -w 0 my-release-key.jks
#   ANDROID_KEYSTORE_PASSWORD — store password
#   ANDROID_KEY_ALIAS         — key alias inside the keystore
#   ANDROID_KEY_PASSWORD      — key password
#
# If you don't have a keystore yet:
#   keytool -genkeypair -v -storetype PKCS12 \
#     -keystore aniston-hrms.jks -alias aniston-hrms \
#     -keyalg RSA -keysize 2048 -validity 10000 \
#     -dname "CN=Aniston HRMS, OU=Mobile, O=Aniston Technologies LLP, L=Delhi, S=Delhi, C=IN"
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version code (integer, must increment with every Play Store upload)'
        required: true
        default: '1'
      version_name:
        description: 'Version name shown to users (e.g. 1.2.0)'
        required: true
        default: '1.0.0'

jobs:

  build-aab:
    name: Build Play Store AAB
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── 3. Java (required by Gradle) ─────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── 4. Android SDK ───────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      # ── 5. Install NPM dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 6. Build frontend (Vite) ─────────────────────────────────────────────
      - name: Build frontend
        run: cd frontend && VITE_API_URL=/api npx vite build
        env:
          VITE_API_URL: /api

      # ── 7. Generate Prisma client (required by workspace install) ─────────────
      - name: Generate Prisma client
        run: npx prisma generate

      # ── 8. Capacitor: init Android project ───────────────────────────────────
      - name: Add Capacitor Android platform (first-time setup)
        working-directory: frontend
        run: npx cap add android 2>/dev/null || echo "Android platform already exists — skipping add"

      - name: Sync Capacitor to Android
        working-directory: frontend
        run: npx cap sync android

      # ── 9. Patch version code + name in build.gradle ─────────────────────────
      - name: Set version code and name
        run: |
          GRADLE_FILE="frontend/android/app/build.gradle"
          sed -i "s/versionCode [0-9]*/versionCode ${{ inputs.version_code }}/" "$GRADLE_FILE"
          sed -i 's/versionName "[^"]*"/versionName "${{ inputs.version_name }}"/' "$GRADLE_FILE"
          echo "=== Updated version info ==="
          grep -E "versionCode|versionName" "$GRADLE_FILE"

      # ── 10. Patch AndroidManifest: background location + foreground service ───
      # @capacitor-community/background-geolocation auto-merges these permissions
      # during cap sync. This step ensures they're present even if the plugin
      # manifest merge has not run yet on a fresh android add.
      - name: Ensure background location permissions in AndroidManifest
        run: |
          MANIFEST="frontend/android/app/src/main/AndroidManifest.xml"

          # ACCESS_BACKGROUND_LOCATION (Android 10+)
          grep -q 'ACCESS_BACKGROUND_LOCATION' "$MANIFEST" || \
            sed -i 's|<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"|<uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"|' "$MANIFEST"

          # FOREGROUND_SERVICE
          grep -q 'FOREGROUND_SERVICE"' "$MANIFEST" || \
            sed -i 's|<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"|<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"|' "$MANIFEST"

          # FOREGROUND_SERVICE_LOCATION (Android 14+)
          grep -q 'FOREGROUND_SERVICE_LOCATION' "$MANIFEST" || \
            sed -i 's|<uses-permission android:name="android.permission.FOREGROUND_SERVICE"|<uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE"|' "$MANIFEST"

          echo "=== Permissions in manifest ==="
          grep 'uses-permission' "$MANIFEST"

      # ── 11. Decode keystore ───────────────────────────────────────────────────
      - name: Decode release keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > aniston-release.jks

      # ── 12. Make Gradlew executable ───────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x frontend/android/gradlew

      # ── 13. Build signed release AAB ─────────────────────────────────────────
      - name: Build signed release AAB
        working-directory: frontend/android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/aniston-release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── 14. Upload AAB artifact ───────────────────────────────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: aniston-hrms-${{ inputs.version_name }}-(${{ inputs.version_code }}).aab
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 60
          if-no-files-found: error

      # ── 15. Upload mapping file (for Play Store crash deobfuscation) ──────────
      - name: Upload ProGuard mapping (optional)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mapping-${{ inputs.version_name }}-(${{ inputs.version_code }})
          path: frontend/android/app/build/outputs/mapping/release/mapping.txt
          retention-days: 60
          if-no-files-found: ignore

      # ── 16. Summary ───────────────────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "## Android AAB Build Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Version Name | ${{ inputs.version_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Version Code | ${{ inputs.version_code }} |" >> $GITHUB_STEP_SUMMARY
          echo "| App ID | com.anistonav.hrms |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Background GPS**: Enabled via \`@capacitor-community/background-geolocation\` foreground service" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the \`.aab\` artifact above and upload it to the Google Play Console." >> $GITHUB_STEP_SUMMARY
