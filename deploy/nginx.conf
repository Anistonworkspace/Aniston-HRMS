server {
    server_name hr.anistonav.com 13.126.128.38;
    root /home/ubuntu/Aniston-HRMS/frontend/dist;
    index index.html;

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        # Allow large file uploads (bulk resume uploads can be up to 50×100MB, documents up to 100MB)
        client_max_body_size 2G;
    }

    # Socket.io
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ===== PWA Critical Files =====

    # Service Worker — never cache, always fetch latest, MUST serve the file
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # Web App Manifest — short cache, correct MIME type, MUST serve the file
    location ~* \.webmanifest$ {
        types { application/manifest+json webmanifest; }
        add_header Cache-Control "no-cache" always;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # .well-known — TWA asset links, Apple app-site-association
    location /.well-known/ {
        default_type application/json;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    # Offline fallback page
    location = /offline.html {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # Hashed assets — cache forever (new deploy = new filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html — never cache
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Uploaded files — proxy to backend (most reliable for monorepo)
    location /uploads/ {
        proxy_pass http://127.0.0.1:4000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Android APK — exact match served directly from the file on disk.
    # SCP uploads into downloads/apk-build/ so we alias the full path.
    # After a successful deploy the SSH step also copies it to downloads/ root
    # so both paths work going forward.
    location = /downloads/aniston-hrms.apk {
        alias /home/ubuntu/Aniston-HRMS/downloads/apk-build/aniston-hrms.apk;
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment; filename="aniston-hrms.apk"' always;
        add_header Cache-Control "no-cache" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Windows Desktop Agent — served directly from disk.
    # CI/CD artifact lands in downloads/agent/agent-build/ (scp-action preserves the
    # local artifact folder name); nginx aliases to the actual file path.
    location = /downloads/aniston-agent-setup.exe {
        alias /home/ubuntu/Aniston-HRMS/downloads/agent/agent-build/aniston-agent-setup.exe;
        default_type application/octet-stream;
        add_header Content-Disposition 'attachment; filename="aniston-agent-setup.exe"' always;
        add_header Cache-Control "no-cache" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # General downloads folder (future files)
    location /downloads/ {
        alias /home/ubuntu/Aniston-HRMS/downloads/;
        add_header Cache-Control "no-cache" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # OTA update bundles — serve directly from /app-updates/ folder
    location /app-updates/ {
        alias /home/ubuntu/Aniston-HRMS/app-updates/;
        add_header Cache-Control "no-cache" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/manifest+json;
    gzip_min_length 256;
    client_max_body_size 2G;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/hr.anistonav.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/hr.anistonav.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = hr.anistonav.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name hr.anistonav.com 13.126.128.38;
    return 404; # managed by Certbot


}
