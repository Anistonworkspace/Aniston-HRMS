services:
  postgres:
    image: postgres:16-alpine
    container_name: aniston-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aniston
      POSTGRES_PASSWORD: aniston_hrms_2026
      POSTGRES_DB: aniston_hrms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aniston -d aniston_hrms"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aniston-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: aniston-ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "Aniston AI Service"
      API_KEY: "${AI_SERVICE_API_KEY:-dev-ai-key}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      DEEPSEEK_BASE_URL: "https://api.deepseek.com/v1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ai/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
