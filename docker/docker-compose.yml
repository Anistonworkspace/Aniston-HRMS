services:
  postgres:
    image: postgres:16-alpine
    container_name: aniston-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aniston
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var is required}
      POSTGRES_DB: aniston_hrms
    volumes:
      - deploy_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aniston -d aniston_hrms"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 256m

  redis:
    image: redis:7-alpine
    container_name: aniston-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD env var is required}
      --bind 127.0.0.1
      --protected-mode yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 128m

  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: aniston-ai-service
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      APP_NAME: "Aniston AI Service"
      API_KEY: "${AI_SERVICE_API_KEY-dev-ai-key}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      DEEPSEEK_BASE_URL: "https://api.deepseek.com/v1"
      AI_LOG_FILE: "/logs/ai-service.log"
    volumes:
      - ai_logs:/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ai/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '1.5'
        reservations:
          memory: 512m
          cpus: '0.5'

volumes:
  deploy_postgres_data:
    external: true
  redis_data:
  ai_logs:
