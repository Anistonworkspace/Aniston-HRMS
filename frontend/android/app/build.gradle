apply plugin: 'com.android.application'

android {
    namespace "com.anistonav.hrms"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.anistonav.hr.twa"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 20
        versionName "1.5.5"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            // Priority: keystore.properties file (local dev) → env vars (CI/CD) → fallback defaults
            def ksProps = new Properties()
            def ksPropFile = rootProject.file("app/keystore.properties")
            if (ksPropFile.exists()) { ksProps.load(new FileInputStream(ksPropFile)) }

            storeFile file(ksProps['storeFile'] ?: System.getenv("KEYSTORE_PATH") ?: "signing.keystore")
            storePassword ksProps['storePassword'] ?: System.getenv("ANDROID_KEYSTORE_PASSWORD") ?: ""
            keyAlias     ksProps['keyAlias']      ?: System.getenv("ANDROID_KEY_ALIAS")          ?: "key0"
            keyPassword  ksProps['keyPassword']   ?: System.getenv("ANDROID_KEY_PASSWORD")       ?: ""
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    // FusedLocationProviderClient for native GPS foreground service
    implementation 'com.google.android.gms:play-services-location:21.3.0'
    // WorkManager — periodic watchdog that restarts GPS service if killed by aggressive OEMs
    implementation 'androidx.work:work-runtime:2.9.1'
    // Guava ListenableFuture — required by WorkManager Worker base class
    implementation 'com.google.guava:guava:33.2.1-android'
    // In-App Update API — prompts employees to update to latest APK version
    implementation 'com.google.android.play:app-update:2.1.0'
    // Biometric authentication — fingerprint/face lock after background idle
    implementation 'androidx.biometric:biometric:1.1.0'
    // EncryptedSharedPreferences — secures GPS credentials (auth token, employee ID) at rest
    // 1.1.0-alpha06 is required; 1.0.0 stable uses deprecated MasterKeys.getOrCreate() API
    implementation 'androidx.security:security-crypto:1.1.0-alpha06'
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
