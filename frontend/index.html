<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />

    <!-- ===== Viewport & PWA core ===== -->
    <!-- viewport-fit=cover → content fills the notch/home-indicator area (safe-area CSS handles padding)
         maximum-scale=5.0  → allows accessibility zoom while preventing unintentional zoom
         user-scalable=no   → locks scale in PWA mode (JS in main.tsx handles touch events for accessibility)
         Double-tap zoom disabled via touch-action:manipulation in globals.css
         iOS input auto-zoom prevented by font-size ≥ 16px on all inputs (see globals.css) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#4f46e5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#4f46e5" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Aniston HRMS — Enterprise Human Resource Management System" />
    <meta name="application-name" content="Aniston HRMS" />
    <meta name="format-detection" content="telephone=no" />

    <!-- ===== Force mobile layout — prevents Android "Request Desktop Site" rendering ===== -->
    <!-- HandheldFriendly + MobileOptimized tell older Android WebViews and Samsung browser
         to render the mobile layout. Modern Chrome ignores these but they don't hurt. -->
    <meta name="HandheldFriendly" content="true" />
    <meta name="MobileOptimized" content="width" />
    <!-- Prevent browsers from requesting the desktop version automatically -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ===== Android / Chrome PWA ===== -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ===== Apple iOS PWA ===== -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Aniston HRMS" />

    <!-- ===== Favicons ===== -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="shortcut icon" href="/icon-192.png" />

    <!-- ===== Apple Touch Icons (all required iOS sizes) ===== -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="57x57" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="60x60" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="72x72" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="76x76" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="114x114" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-512.png" />

    <meta name="msapplication-TileImage" content="/icon-512.png" />
    <meta name="msapplication-config" content="none" />
    <meta name="msapplication-tap-highlight" content="no" />

    <meta property="og:title" content="Aniston HRMS" />
    <meta property="og:description" content="Enterprise Human Resource Management System — Attendance, Leave, Payroll & more" />

    <meta property="og:url" content="https://hr.anistonav.com" />

    <title>Aniston HRMS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
