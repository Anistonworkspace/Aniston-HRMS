<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#4f46e5" />
  <title>Aniston HRMS — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      text-align: center;
      max-width: 360px;
    }
    .icon-wrap {
      width: 80px; height: 80px;
      margin: 0 auto 1.5rem;
      background: #eef2ff;
      border-radius: 1.25rem;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-wrap svg { color: #6366f1; }
    h1 {
      font-family: 'Sora', sans-serif;
      font-size: 1.375rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.875rem;
      color: #64748b;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }
    .retry-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .retry-btn:hover { background: #4338ca; }
    .retry-btn:active { transform: scale(0.97); }
    .status {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #94a3b8;
    }
    .dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: #ef4444;
      border-radius: 50%;
      margin-right: 0.375rem;
      vertical-align: middle;
    }
    .dot.online { background: #22c55e; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="m2 2 20 20"/><path d="M8.5 16.429a5 5 0 0 1 7 0"/><path d="M5 12.859a10 10 0 0 1 5.17-2.69"/><path d="M13.83 10.17A10 10 0 0 1 19 12.86"/><path d="M2 8.82a15 15 0 0 1 4.17-2.65"/><path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"/><line x1="12" x2="12.01" y1="20" y2="20"/>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Check your network and try again.</p>
    <button class="retry-btn" onclick="window.location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
      Try Again
    </button>
    <div class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Offline</span>
    </div>
  </div>
  <script>
    function updateStatus() {
      var dot = document.getElementById('statusDot');
      var text = document.getElementById('statusText');
      if (navigator.onLine) {
        dot.classList.add('online');
        text.textContent = 'Back online — refreshing...';
        setTimeout(function() { window.location.reload(); }, 1000);
      } else {
        dot.classList.remove('online');
        text.textContent = 'Offline';
      }
    }
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();
  </script>
</body>
</html>
